upstreams:
  ark:
    base: "https://ark.cn-beijing.volces.com/api/coding/v1"
    protocol: anthropic
    auth: "${ARK_API_KEY}"
    timeout: 120

  cliproxy:
    base: "http://127.0.0.1:8317"
    protocol: openai
    auth: "${CLIPROXY_KEY}"
    timeout: 300

