# 本地 claw-router — ShinkaEvolve 专用
# 统一路由: ShinkaEvolve → localhost:3457 → 三个 key 源

upstreams:
  ark-coding:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    protocol: openai
    auth: "${ARK_API_KEY}"
    timeout: 300

hubs:
  # --- 火山引擎 ARK Coding Plan (8模型) ---
  doubao-seed-2.0-code:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: doubao-seed-2.0-code
    auth: "${ARK_API_KEY}"
  doubao-seed-2.0-pro:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: doubao-seed-2.0-pro
    auth: "${ARK_API_KEY}"
  doubao-seed-2.0-lite:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: doubao-seed-2.0-lite
    auth: "${ARK_API_KEY}"
  doubao-seed-code:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: doubao-seed-code
    auth: "${ARK_API_KEY}"
  minimax-m2.5:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: minimax-m2.5
    auth: "${ARK_API_KEY}"
  glm-4.7:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: glm-4.7
    auth: "${ARK_API_KEY}"
  deepseek-v3.2:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: deepseek-v3.2
    auth: "${ARK_API_KEY}"
  kimi-k2.5:
    base: "https://ark.cn-beijing.volces.com/api/coding/v3"
    model: kimi-k2.5
    auth: "${ARK_API_KEY}"

  # --- GLM-5 (mydamoxing.cn) ---
  glm-5:
    base: "https://mydamoxing.cn/v1"
    model: glm-5
    auth: "${GLM5_KEY}"
  glm-5-turbo:
    base: "https://mydamoxing.cn/v1"
    model: glm-5-turbo
    auth: "${GLM5_KEY}"

  # --- MiniMax (codexcc.top) ---
  minimax-m2.7:
    base: "https://api.codexcc.top/v1"
    model: MiniMax-M2.7-highspeed
    auth: "${MINIMAX_KEY}"
