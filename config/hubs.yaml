# Upstream providers (protocol-specific)
upstreams:
  ark:
    base: "https://ark.cn-beijing.volces.com/api/coding/v1"
    protocol: anthropic
    auth: "${ARK_API_KEY}"
    timeout: 120

  cliproxy:
    base: "http://127.0.0.1:8317"
    protocol: openai
    auth: "${CLIPROXY_KEY}"
    timeout: 300

# Free LLM hubs (OpenAI-compatible)
# Replace base URLs with your actual hub endpoints
hubs:
  kimi:
    base: "${HUB_KIMI_BASE:-http://localhost:8010}"
    model: moonshot-v1
    auth: "${HUB_KIMI_AUTH}"
  deepseek:
    base: "${HUB_DEEPSEEK_BASE:-http://localhost:8011}"
    model: deepseek-chat
    auth: "${HUB_DEEPSEEK_AUTH}"
  deepseek-think:
    base: "${HUB_DEEPSEEK_BASE:-http://localhost:8011}"
    model: deepseek-think
    auth: "${HUB_DEEPSEEK_AUTH}"
  glm:
    base: "${HUB_GLM_BASE:-http://localhost:8013}"
    model: glm-4.7
    auth: "${HUB_GLM_AUTH}"
  doubao:
    base: "${HUB_DOUBAO_BASE:-http://localhost:8014}"
    model: doubao
    auth: "${HUB_DOUBAO_AUTH}"
  minimax:
    base: "${HUB_MINIMAX_BASE:-http://localhost:8017}"
    model: MiniMax-M2
    auth: "${HUB_MINIMAX_AUTH}"
  metaso:
    base: "${HUB_METASO_BASE:-http://localhost:8019}"
    model: research
    auth: "${HUB_METASO_AUTH}"
  qwen:
    base: "${HUB_QWEN_BASE:-http://localhost:8012}"
    model: qwen-max
    auth: "${HUB_QWEN_AUTH}"
  yuanbao:
    base: "${HUB_YUANBAO_BASE:-http://localhost:8015}"
    model: hunyuan
    auth: "${HUB_YUANBAO_AUTH}"
  gemini:
    base: "${HUB_GEMINI_BASE:-http://localhost:8020}"
    model: gemini-3.1-pro
    auth: ""
  gemini-flash:
    base: "${HUB_GEMINI_BASE:-http://localhost:8020}"
    model: gemini-3.0-flash
    auth: ""
  gemini-think:
    base: "${HUB_GEMINI_BASE:-http://localhost:8020}"
    model: gemini-3.0-flash-thinking
    auth: ""
