  reasoning: '(?:\b(?:analyze|reason|think|step.by.step|explain why|compare|evaluate|pros.and.cons|trade.?off|architecture|design|plan|strategy)\b|分析|推理|为什么|比较|权衡|架构|设计)'
  fast: '(?:\b(?:translate|summarize|hello|hi|hey|thanks|yes|no|ok)\b|翻译|总结|你好|谢谢|是的|好的)'
